name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Compile scripts
        run: |
          python -m py_compile scripts/config_migration.py scripts/run_digest.py scripts/prepare_fields.py scripts/feedback_cli.py scripts/apply_feedback.py

      - name: Run unit tests
        run: |
          pytest -q tests
