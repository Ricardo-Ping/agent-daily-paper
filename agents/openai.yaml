display_name: Agent Daily Paper
short_description: 多领域 arXiv 每日论文订阅与即时/定时双模式推送
default_prompt: 首次先执行 python scripts/bootstrap_env.py --run-doctor 完成环境与配置引导，再检查并补齐订阅配置；默认读取 config/agent_field_profiles.json 进行领域解析。支持即时推送（instant_digest）与定时推送（run_digest + only-due-now），并在聊天中返回完整 Markdown 结果且写入 output/daily。
